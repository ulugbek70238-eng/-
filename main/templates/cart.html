<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Избранное</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-white">
<header class="p-3 text-bg-dark sticky-top">
    <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
            <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none">
            <span>Ташкент 24 |</span>
            </a>
            <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
                <li><a href="/" class="nav-link px-2 text-white">Главная</a></li>
            </ul>
            <form action="{% url 'search' %}" method="post">
                {% csrf_token %}
                <input name="search_product"  required type="search" class=" form-control form-control- text-dark "
                       placeholder="Поиск" aria-label="Search">
            </form>

        <a href="/logout" class="btn btn-danger">Выйти</a>
    </div>
</header>

<div class="container py-4">
    {% if user_cart %}
        <h2 class="pb-2 border-bottom">Ваше избранное</h2>
        <div class="row g-4 py-5 row-cols-1 row-cols-lg-3">
            {% for item in user_cart %}
            <div class="col">
                <div class="card bg-secondary text-white">
                    <img src="{{ item.user_product.theme_photo.url }} " class="card-img-top" alt="{{ item.user_product.name_theme }}" width="300" height="300">
                    <div class="card-body">
                         <h5 class="fs-2 text">{{ item.user_product.name_theme }}</h5>
                        <p class="card-text">{{ item.user_product.theme_dec|slice:64 }}...</p>
                        <a href="/theme2/{{ item.user_product.id }}" class="btn btn-light">Подробнее →</a>
                        <a href="{% url 'remove_favorite' item.user_product.id %}" class="btn btn-danger">Удалить</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    {% else %}
        <h3 class="text-center">Избранное пусто!</h3>
    {% endif %}
</div>
</body>
</html>
